# ==========================================
# CẤU HÌNH ỨNG DỤNG CLOTHING SHOP
# ==========================================

# Tên ứng dụng
spring.application.name=clothing-shop

# Nạp mật khẩu SMTP cục bộ (application-local.properties, không commit) — phải khai báo sớm
spring.config.import=optional:file:./application-local.properties

# Port chạy server (Railway cung cấp qua biến PORT, fallback 8080 cho môi trường cloud)
server.port=${PORT:8080}
# Lắng nghe mọi interface (0.0.0.0) để máy ảo LDPlayer / AVD / điện thoại qua LAN gọi được
server.address=0.0.0.0

# ==========================================
# CẤU HÌNH DATABASE MySQL
# Ưu tiên SPRING_DATASOURCE_*; fallback MYSQL* (Railway MySQL plugin),
# cuối cùng mới fallback local để dev máy cá nhân.
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:clothing_shop}?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4
# Nếu MySQL chưa bật: fail nhanh thay vì treo request vài chục giây
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=3000
# Trên cloud, cho phép ứng dụng khởi động dù DB có thể sẵn sàng chậm vài giây
spring.datasource.hikari.initialization-fail-timeout=0

# ==========================================
# CẤU HÌNH JPA / HIBERNATE
# ==========================================
# update: tự động cập nhật schema khi chạy (có thể override bằng env ở production)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# CẤU HÌNH THYMELEAF
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# Ép toàn bộ request/response dùng UTF-8 để tránh lỗi chữ bị '?'
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ==========================================
# CẤU HÌNH UPLOAD FILE (ảnh sản phẩm)
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Thư mục lưu ảnh upload (thay đổi đường dẫn theo máy của bạn)
app.upload.dir=uploads/products
# Avatar: uploads/avatars/ (URL /uploads/avatars/…) — UserService

# ==========================================
# JWT (mobile admin /api/admin/**) — đổi secret production; tối thiểu ~32 ký tự cho HS256
# ==========================================
app.jwt.secret=dev-only-change-me-use-32-chars-minimum-clothing-shop-jwt
app.jwt.expiration-ms=86400000

# ==========================================
# CẤU HÌNH LOGGING
# ==========================================
logging.level.com.shop=${APP_LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}

# ==========================================
# CẤU HÌNH GỬI EMAIL BILL (GMAIL SMTP)
# ==========================================
# Dùng App Password của Gmail (không dùng mật khẩu đăng nhập thường)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=lengocminhnhat3@gmail.com
# Ưu tiên GMAIL_APP_PASSWORD; nếu không có thì dùng app.mail.smtp.password trong application-local.properties
spring.mail.password=${GMAIL_APP_PASSWORD:${app.mail.smtp.password:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Bật/tắt gửi bill sau khi đặt hàng
app.mail.bill.enabled=${APP_MAIL_BILL_ENABLED:true}
# Email hiển thị ở phần người gửi (nếu để trống sẽ lấy spring.mail.username)
app.mail.bill.from=
