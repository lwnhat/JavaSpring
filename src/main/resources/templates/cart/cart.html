<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ Hàng - ClothingShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-4">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item active">Giỏ hàng</li>
        </ol>
    </nav>

    <h2 class="fw-bold mb-4">
        <i class="bi bi-cart3 me-2 text-danger"></i>Giỏ Hàng Của Tôi
    </h2>

    <!-- Thông báo -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Giỏ hàng trống -->
    <div th:if="${cartItems == null or cartItems.empty}" class="text-center py-5">
        <i class="bi bi-cart-x fs-1 text-muted"></i>
        <h4 class="text-muted mt-3">Giỏ hàng của bạn đang trống!</h4>
        <a th:href="@{/products}" class="btn btn-danger mt-3">
            <i class="bi bi-bag-plus me-2"></i>Tiếp tục mua sắm
        </a>
    </div>

    <!-- Có sản phẩm trong giỏ -->
    <div th:if="${cartItems != null and !cartItems.empty}">
        <div class="row g-4">
            <!-- Danh sách sản phẩm trong giỏ -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4">Sản phẩm</th>
                                        <th class="text-center">Đơn giá</th>
                                        <th class="text-center">Số lượng</th>
                                        <th class="text-center">Thành tiền</th>
                                        <th class="text-center">Xóa</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item : ${cartItems}">
                                        <!-- Ảnh + Tên sản phẩm -->
                                        <td class="ps-4">
                                            <div class="d-flex align-items-center gap-3">
                                                <img th:src="${item.product.imageUrl}"
                                                     th:alt="${item.product.name}"
                                                     style="width: 70px; height: 70px; object-fit: cover;"
                                                     class="rounded"
                                                     onerror="this.src='/images/no-image.svg'">
                                                <div>
                                                    <a th:href="@{/products/{id}(id=${item.product.id})}"
                                                       th:text="${item.product.name}"
                                                       class="text-decoration-none text-dark fw-semibold">
                                                    </a>
                                                    <br>
                                                    <small class="text-muted"
                                                           th:if="${item.product.category != null}"
                                                           th:text="${item.product.category.name}">
                                                    </small>
                                                </div>
                                            </div>
                                        </td>
                                        <!-- Đơn giá -->
                                        <td class="text-center">
                                            <span class="text-danger fw-semibold">
                                                <span th:text="${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                                            </span>
                                        </td>
                                        <!-- Form cập nhật số lượng -->
                                        <td class="text-center">
                                            <form th:action="@{/cart/update}" method="post"
                                                  class="d-flex align-items-center justify-content-center gap-1">
                                                <input type="hidden" th:name="${_csrf.parameterName}"
                                                       th:value="${_csrf.token}">
                                                <input type="hidden" name="cartItemId"
                                                       th:value="${item.id}">
                                                <div class="input-group input-group-sm" style="width: 120px;">
                                                    <button type="submit" class="btn btn-outline-secondary"
                                                            name="quantity"
                                                            th:value="${item.quantity - 1}">-</button>
                                                    <input type="number" class="form-control text-center"
                                                           th:value="${item.quantity}"
                                                           name="quantity" min="1" readonly>
                                                    <button type="submit" class="btn btn-outline-secondary"
                                                            name="quantity"
                                                            th:value="${item.quantity + 1}">+</button>
                                                </div>
                                            </form>
                                        </td>
                                        <!-- Thành tiền -->
                                        <td class="text-center">
                                            <span class="fw-bold text-danger">
                                                <span th:text="${#numbers.formatDecimal(item.subTotal, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                                            </span>
                                        </td>
                                        <!-- Xóa -->
                                        <td class="text-center">
                                            <form th:action="@{/cart/remove/{id}(id=${item.id})}"
                                                  method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}"
                                                       th:value="${_csrf.token}">
                                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                                        onclick="return confirm('Xóa sản phẩm này?')">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <!-- Tiếp tục mua sắm -->
                <div class="mt-3">
                    <a th:href="@{/products}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Tiếp tục mua sắm
                    </a>
                </div>
            </div>

            <!-- Tổng tiền + Checkout -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-dark text-white fw-bold">
                        <i class="bi bi-receipt me-2"></i>Tóm tắt đơn hàng
                    </div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <span>Số sản phẩm:</span>
                            <span class="fw-bold" th:text="${cartItems.size()}">0</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Tạm tính:</span>
                            <span class="fw-bold">
                                <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                            </span>
                        </div>
                        <div class="d-flex justify-content-between mb-2 text-success">
                            <span>Phí vận chuyển:</span>
                            <span class="fw-bold">Miễn phí</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="fw-bold fs-5">Tổng cộng:</span>
                            <span class="fw-bold fs-5 text-danger">
                                <span th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                            </span>
                        </div>
                        <!-- Nút Đặt hàng -->
                        <div class="d-grid">
                            <a th:href="@{/orders/checkout}" class="btn btn-danger btn-lg">
                                <i class="bi bi-bag-check me-2"></i>Đặt hàng ngay
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
