<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.id == null} ? 'Thêm Sản Phẩm' : 'Sửa Sản Phẩm'">Product Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .admin-sidebar { min-height: 100vh; background-color: #1a1a2e; }
        .sidebar-link { color: #adb5bd; transition: all 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { color: #fff; background: rgba(255,255,255,0.1); border-radius: 8px; }
        .img-preview { max-height: 200px; object-fit: contain; }
    </style>
</head>
<body class="bg-light">

<div class="d-flex">
    <!-- SIDEBAR -->
    <div class="admin-sidebar p-3" style="width: 250px; min-width: 250px;">
        <div class="text-white text-center py-3 mb-3 border-bottom border-secondary">
            <i class="bi bi-shield-lock-fill text-danger fs-2"></i>
            <div class="fw-bold mt-1">Admin Panel</div>
            <small class="text-muted" sec:authentication="name">Admin</small>
        </div>
        <nav class="nav flex-column gap-1">
            <a th:href="@{/admin/dashboard}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a th:href="@{/admin/products}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2 active">
                <i class="bi bi-box-seam"></i> Sản phẩm
            </a>
            <a th:href="@{/admin/categories}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2">
                <i class="bi bi-tags"></i> Danh mục
            </a>
            <a th:href="@{/admin/orders}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2">
                <i class="bi bi-receipt"></i> Đơn hàng
            </a>
            <a th:href="@{/admin/users}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2">
                <i class="bi bi-people"></i> Người dùng
            </a>
            <hr class="border-secondary">
            <a th:href="@{/}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2">
                <i class="bi bi-house"></i> Về trang chủ
            </a>
        </nav>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-grow-1 p-4">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a th:href="@{/admin/products}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h3 class="fw-bold mb-0">
                <span th:if="${product.id == null}">
                    <i class="bi bi-plus-circle me-2 text-success"></i>Thêm Sản Phẩm Mới
                </span>
                <span th:if="${product.id != null}">
                    <i class="bi bi-pencil me-2 text-warning"></i>Sửa Sản Phẩm
                </span>
            </h3>
        </div>

        <!-- Thông báo lỗi -->
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible">
            <span th:text="${errorMsg}"></span>
            <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <!-- Form enctype multipart cho upload ảnh -->
                <form th:action="@{/admin/products/save}"
                      method="post"
                      th:object="${product}"
                      enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <!-- ID ẩn khi update -->
                    <input type="hidden" th:field="*{id}">
                    <!-- Giữ lại tên ảnh cũ nếu không upload ảnh mới -->
                    <input type="hidden" th:field="*{image}">

                    <div class="row g-4">
                        <!-- Cột trái -->
                        <div class="col-md-8">
                            <!-- Tên sản phẩm -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Tên sản phẩm <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control"
                                       th:class="${#fields.hasErrors('name')} ? 'form-control is-invalid' : 'form-control'"
                                       th:field="*{name}"
                                       placeholder="VD: Áo thun cổ tròn basic">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('name')}"
                                     th:errors="*{name}"></div>
                            </div>

                            <!-- Danh mục -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Danh mục <span class="text-danger">*</span>
                                </label>
                                <select class="form-select" name="categoryId">
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.id}"
                                            th:text="${cat.name}"
                                            th:selected="${product.category != null and product.category.id == cat.id}">
                                    </option>
                                </select>
                            </div>

                            <!-- Giá -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Giá bán (₫) <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text">₫</span>
                                    <input type="number" class="form-control"
                                           th:class="${#fields.hasErrors('price')} ? 'form-control is-invalid' : 'form-control'"
                                           th:field="*{price}"
                                           placeholder="VD: 299000" min="0">
                                    <div class="invalid-feedback"
                                         th:if="${#fields.hasErrors('price')}"
                                         th:errors="*{price}"></div>
                                </div>
                            </div>

                            <!-- Số lượng tồn kho -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Số lượng tồn kho</label>
                                <input type="number" class="form-control" th:field="*{stock}"
                                       min="0" placeholder="0">
                            </div>

                            <!-- Size -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Kích cỡ
                                    <small class="text-muted">(phân cách bằng dấu phẩy)</small>
                                </label>
                                <input type="text" class="form-control" th:field="*{sizes}"
                                       placeholder="S, M, L, XL, XXL">
                            </div>

                            <!-- Màu sắc -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Màu sắc
                                    <small class="text-muted">(phân cách bằng dấu phẩy)</small>
                                </label>
                                <input type="text" class="form-control" th:field="*{colors}"
                                       placeholder="Đen, Trắng, Xanh navy">
                            </div>

                            <!-- Mô tả -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mô tả sản phẩm</label>
                                <textarea class="form-control" th:field="*{description}"
                                          rows="4"
                                          placeholder="Mô tả chi tiết về sản phẩm..."></textarea>
                            </div>
                        </div>

                        <!-- Cột phải: upload ảnh + options -->
                        <div class="col-md-4">
                            <!-- Upload ảnh -->
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Ảnh sản phẩm</label>
                                <!-- Preview ảnh hiện tại -->
                                <div class="mb-2 text-center border rounded p-2 bg-white">
                                    <img id="imagePreview"
                                         th:src="${product.imageUrl}"
                                         class="img-fluid img-preview"
                                         onerror="this.src='/images/no-image.svg'"
                                         style="max-height: 200px;">
                                </div>
                                <input type="file" class="form-control form-control-sm"
                                       name="imageFile" id="imageFile"
                                       accept="image/*"
                                       onchange="previewImage(this)">
                                <small class="text-muted">JPG, PNG, GIF (tối đa 10MB)</small>
                            </div>

                            <!-- Options -->
                            <div class="card border-0 bg-light p-3">
                                <h6 class="fw-bold mb-3">Tùy chọn</h6>
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox"
                                           th:field="*{active}" id="active">
                                    <label class="form-check-label fw-semibold" for="active">
                                        Đang bán (hiện trên web)
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           th:field="*{featured}" id="featured">
                                    <label class="form-check-label fw-semibold" for="featured">
                                        <i class="bi bi-star-fill text-warning"></i>
                                        Sản phẩm nổi bật
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Nút lưu -->
                    <hr>
                    <div class="d-flex gap-3">
                        <a th:href="@{/admin/products}" class="btn btn-outline-secondary px-4">
                            Hủy
                        </a>
                        <button type="submit" class="btn btn-success px-5">
                            <i class="bi bi-save me-2"></i>
                            <span th:text="${product.id == null} ? 'Thêm sản phẩm' : 'Lưu thay đổi'"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Preview ảnh trước khi upload
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imagePreview').src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
