<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sản Phẩm - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .admin-sidebar { min-height: 100vh; background-color: #1a1a2e; }
        .sidebar-link { color: #adb5bd; transition: all 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { color: #fff; background: rgba(255,255,255,0.1); border-radius: 8px; }
    </style>
</head>
<body class="bg-light">

<div class="d-flex">
    <!-- SIDEBAR -->
    <div class="admin-sidebar p-3" style="width: 250px; min-width: 250px;">
        <div class="text-white text-center py-3 mb-3 border-bottom border-secondary">
            <i class="bi bi-shield-lock-fill text-danger fs-2"></i>
            <div class="fw-bold mt-1">Admin Panel</div>
            <small class="text-muted" sec:authentication="name">Admin</small>
        </div>
        <nav class="nav flex-column gap-1">
            <a th:href="@{/admin/dashboard}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a th:href="@{/admin/products}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2 active">
                <i class="bi bi-box-seam"></i> Sản phẩm
            </a>
            <a th:href="@{/admin/categories}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2">
                <i class="bi bi-tags"></i> Danh mục
            </a>
            <a th:href="@{/admin/orders}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2">
                <i class="bi bi-receipt"></i> Đơn hàng
            </a>
            <a th:href="@{/admin/users}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2">
                <i class="bi bi-people"></i> Người dùng
            </a>
            <hr class="border-secondary">
            <a th:href="@{/}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2">
                <i class="bi bi-house"></i> Về trang chủ
            </a>
            <a th:href="@{/auth/logout}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2">
                <i class="bi bi-box-arrow-right text-danger"></i>
                <span class="text-danger">Đăng xuất</span>
            </a>
        </nav>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold">
                <i class="bi bi-box-seam me-2 text-danger"></i>Quản Lý Sản Phẩm
            </h3>
            <a th:href="@{/admin/products/new}" class="btn btn-danger">
                <i class="bi bi-plus-lg me-2"></i>Thêm sản phẩm
            </a>
        </div>

        <!-- Thông báo -->
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible">
            <span th:text="${successMsg}"></span>
            <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible">
            <span th:text="${errorMsg}"></span>
            <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Bảng sản phẩm -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-dark text-white">
                            <tr>
                                <th class="ps-3">#</th>
                                <th>Ảnh</th>
                                <th>Tên sản phẩm</th>
                                <th>Danh mục</th>
                                <th>Giá</th>
                                <th>Kho</th>
                                <th>Trạng thái</th>
                                <th class="text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="product, stat : ${products}">
                                <td class="ps-3 text-muted" th:text="${stat.count}"></td>
                                <td>
                                    <img th:src="${product.imageUrl}"
                                         style="width: 55px; height: 55px; object-fit: cover;"
                                         class="rounded shadow-sm"
                                         onerror="this.src='/images/no-image.svg'">
                                </td>
                                <td>
                                    <span class="fw-semibold" th:text="${product.name}"></span>
                                    <div th:if="${product.featured}">
                                        <small class="badge bg-warning text-dark">
                                            <i class="bi bi-star-fill"></i> Nổi bật
                                        </small>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge bg-secondary"
                                          th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}">
                                    </span>
                                </td>
                                <td class="text-danger fw-semibold">
                                    <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                                </td>
                                <td>
                                    <span th:class="${product.stock > 0} ? 'badge bg-success' : 'badge bg-danger'"
                                          th:text="${product.stock}"></span>
                                </td>
                                <td>
                                    <span th:class="${product.active} ? 'badge bg-success' : 'badge bg-secondary'"
                                          th:text="${product.active} ? 'Đang bán' : 'Ngừng bán'">
                                    </span>
                                </td>
                                <td class="text-center">
                                    <!-- Không dùng btn-group bọc <form>: một số trình duyệt bấm Xóa không gửi POST đúng -->
                                    <div class="d-inline-flex flex-wrap gap-1 justify-content-center align-items-center">
                                        <a th:href="@{/products/{id}(id=${product.id})}"
                                           class="btn btn-outline-info btn-sm"
                                           target="_blank" title="Xem trang sản phẩm">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
                                           class="btn btn-outline-warning btn-sm" title="Chỉnh sửa">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form th:action="@{/admin/products/delete/{id}(id=${product.id})}"
                                              method="post" class="d-inline m-0"
                                              onsubmit="return confirm('Xác nhận xóa sản phẩm này? (sẽ ẩn khỏi cửa hàng)')">
                                            <input type="hidden" th:name="${_csrf.parameterName}"
                                                   th:value="${_csrf.token}">
                                            <button type="submit" class="btn btn-outline-danger btn-sm" title="Xóa">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <!-- Bảng trống -->
                            <tr th:if="${products == null or products.empty}">
                                <td colspan="8" class="text-center py-4 text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                    Chưa có sản phẩm nào
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
