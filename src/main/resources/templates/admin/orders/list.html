<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .admin-sidebar { min-height: 100vh; background-color: #1a1a2e; }
        .sidebar-link { color: #adb5bd; transition: all 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { color: #fff; background: rgba(255,255,255,0.1); border-radius: 8px; }
    </style>
</head>
<body class="bg-light">
<div class="d-flex">
    <!-- SIDEBAR -->
    <div class="admin-sidebar p-3" style="width: 250px; min-width: 250px;">
        <div class="text-white text-center py-3 mb-3 border-bottom border-secondary">
            <i class="bi bi-shield-lock-fill text-danger fs-2"></i>
            <div class="fw-bold mt-1">Admin Panel</div>
            <small class="text-muted" sec:authentication="name">Admin</small>
        </div>
        <nav class="nav flex-column gap-1">
            <a th:href="@{/admin/dashboard}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a th:href="@{/admin/products}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-box-seam"></i> Sản phẩm</a>
            <a th:href="@{/admin/categories}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-tags"></i> Danh mục</a>
            <a th:href="@{/admin/orders}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2 active"><i class="bi bi-receipt"></i> Đơn hàng</a>
            <a th:href="@{/admin/users}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-people"></i> Người dùng</a>
            <hr class="border-secondary">
            <a th:href="@{/}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-house"></i> Trang chủ</a>
        </nav>
    </div>

    <!-- MAIN -->
    <div class="flex-grow-1 p-4">
        <h3 class="fw-bold mb-4">
            <i class="bi bi-receipt me-2 text-danger"></i>Quản Lý Đơn Hàng
        </h3>

        <div th:if="${successMsg}" class="alert alert-success alert-dismissible">
            <span th:text="${successMsg}"></span>
            <button class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-dark text-white">
                            <tr>
                                <th class="ps-3">Mã đơn</th>
                                <th>Khách hàng</th>
                                <th>SĐT</th>
                                <th>Tổng tiền</th>
                                <th>Ngày đặt</th>
                                <th>Trạng thái</th>
                                <th class="text-center">Chi tiết</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td class="ps-3 fw-bold text-danger">#<span th:text="${order.id}"></span></td>
                                <td>
                                    <div th:text="${order.user.username}" class="fw-semibold"></div>
                                    <small class="text-muted" th:text="${order.user.email}"></small>
                                </td>
                                <td th:text="${order.phone}"></td>
                                <td class="fw-semibold">
                                    <span th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                                </td>
                                <td>
                                    <small th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></small>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${order.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                                          (${order.status.name() == 'CONFIRMED'} ? 'bg-info text-dark' :
                                                          (${order.status.name() == 'SHIPPING'} ? 'bg-primary' :
                                                          (${order.status.name() == 'DELIVERED'} ? 'bg-success' : 'bg-danger')))"
                                          th:text="${order.status.displayName}">
                                    </span>
                                </td>
                                <td class="text-center">
                                    <a th:href="@{/admin/orders/{id}(id=${order.id})}"
                                       class="btn btn-outline-primary btn-sm">
                                        <i class="bi bi-eye me-1"></i>Xem
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${orders == null or orders.empty}">
                                <td colspan="7" class="text-center py-4 text-muted">Chưa có đơn hàng</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
