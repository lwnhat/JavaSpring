<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Danh Mục - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .admin-sidebar { min-height: 100vh; background-color: #1a1a2e; }
        .sidebar-link { color: #adb5bd; transition: all 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { color: #fff; background: rgba(255,255,255,0.1); border-radius: 8px; }
    </style>
</head>
<body class="bg-light">
<div class="d-flex">
    <!-- SIDEBAR -->
    <div class="admin-sidebar p-3" style="width: 250px; min-width: 250px;">
        <div class="text-white text-center py-3 mb-3 border-bottom border-secondary">
            <i class="bi bi-shield-lock-fill text-danger fs-2"></i>
            <div class="fw-bold mt-1">Admin Panel</div>
            <small class="text-muted" sec:authentication="name">Admin</small>
        </div>
        <nav class="nav flex-column gap-1">
            <a th:href="@{/admin/dashboard}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a th:href="@{/admin/products}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-box-seam"></i> Sản phẩm</a>
            <a th:href="@{/admin/categories}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2 active"><i class="bi bi-tags"></i> Danh mục</a>
            <a th:href="@{/admin/orders}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-receipt"></i> Đơn hàng</a>
            <a th:href="@{/admin/users}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-people"></i> Người dùng</a>
            <hr class="border-secondary">
            <a th:href="@{/}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-house"></i> Trang chủ</a>
            <a th:href="@{/auth/logout}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-box-arrow-right text-danger"></i><span class="text-danger">Đăng xuất</span></a>
        </nav>
    </div>

    <!-- MAIN -->
    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold"><i class="bi bi-tags me-2 text-danger"></i>Quản Lý Danh Mục</h3>
            <a th:href="@{/admin/categories/new}" class="btn btn-danger">
                <i class="bi bi-plus-lg me-2"></i>Thêm danh mục
            </a>
        </div>

        <div th:if="${successMsg}" class="alert alert-success alert-dismissible">
            <span th:text="${successMsg}"></span><button class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible">
            <span th:text="${errorMsg}"></span><button class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="bg-dark text-white">
                        <tr>
                            <th class="ps-3">#</th>
                            <th>Tên danh mục</th>
                            <th>Mô tả</th>
                            <th>Số sản phẩm</th>
                            <th class="text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat, stat : ${categories}">
                            <td class="ps-3 text-muted" th:text="${stat.count}"></td>
                            <td class="fw-semibold" th:text="${cat.name}"></td>
                            <td class="text-muted" th:text="${cat.description ?: '-'}"></td>
                            <td>
                                <span class="badge bg-info"
                                      th:text="${cat.products != null ? cat.products.size() : 0} + ' sản phẩm'">
                                </span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                                       class="btn btn-outline-warning">
                                        <i class="bi bi-pencil"></i> Sửa
                                    </a>
                                    <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Xóa danh mục này?')">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-outline-danger">
                                            <i class="bi bi-trash"></i> Xóa
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${categories == null or categories.empty}">
                            <td colspan="5" class="text-center text-muted py-4">Chưa có danh mục</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
