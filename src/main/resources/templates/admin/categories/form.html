<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${category.id == null} ? 'Thêm Danh Mục' : 'Sửa Danh Mục'">Category Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .admin-sidebar { min-height: 100vh; background-color: #1a1a2e; }
        .sidebar-link { color: #adb5bd; transition: all 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { color: #fff; background: rgba(255,255,255,0.1); border-radius: 8px; }
    </style>
</head>
<body class="bg-light">
<div class="d-flex">
    <!-- SIDEBAR -->
    <div class="admin-sidebar p-3" style="width: 250px; min-width: 250px;">
        <div class="text-white text-center py-3 mb-3 border-bottom border-secondary">
            <i class="bi bi-shield-lock-fill text-danger fs-2"></i>
            <div class="fw-bold mt-1">Admin Panel</div>
            <small class="text-muted" sec:authentication="name">Admin</small>
        </div>
        <nav class="nav flex-column gap-1">
            <a th:href="@{/admin/dashboard}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a th:href="@{/admin/products}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-box-seam"></i> Sản phẩm</a>
            <a th:href="@{/admin/categories}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2 active"><i class="bi bi-tags"></i> Danh mục</a>
            <a th:href="@{/admin/orders}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-receipt"></i> Đơn hàng</a>
            <a th:href="@{/admin/users}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-people"></i> Người dùng</a>
            <hr class="border-secondary">
            <a th:href="@{/}" class="sidebar-link nav-link d-flex align-items-center gap-2 p-2"><i class="bi bi-house"></i> Trang chủ</a>
        </nav>
    </div>

    <!-- MAIN -->
    <div class="flex-grow-1 p-4">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a th:href="@{/admin/categories}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h3 class="fw-bold mb-0">
                <span th:if="${category.id == null}">
                    <i class="bi bi-plus-circle me-2 text-success"></i>Thêm Danh Mục Mới
                </span>
                <span th:if="${category.id != null}">
                    <i class="bi bi-pencil me-2 text-warning"></i>Sửa Danh Mục
                </span>
            </h3>
        </div>

        <div class="card border-0 shadow-sm" style="max-width: 600px;">
            <div class="card-body p-4">
                <form th:action="@{/admin/categories/save}" method="post" th:object="${category}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Tên danh mục <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control"
                               th:class="${#fields.hasErrors('name')} ? 'form-control is-invalid' : 'form-control'"
                               th:field="*{name}"
                               placeholder="VD: Áo, Quần, Váy...">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                             th:errors="*{name}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Mô tả</label>
                        <textarea class="form-control" th:field="*{description}" rows="3"
                                  placeholder="Mô tả ngắn về danh mục này..."></textarea>
                    </div>

                    <div class="d-flex gap-3">
                        <a th:href="@{/admin/categories}" class="btn btn-outline-secondary px-4">Hủy</a>
                        <button type="submit" class="btn btn-success px-5">
                            <i class="bi bi-save me-2"></i>
                            <span th:text="${category.id == null} ? 'Thêm mới' : 'Lưu thay đổi'"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
