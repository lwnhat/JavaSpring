<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông Tin Cá Nhân - ClothingShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h3 class="fw-bold mb-3">
                        <i class="bi bi-person-vcard text-danger me-2"></i>Thông tin cá nhân
                    </h3>
                    <p class="text-muted mb-4">Cập nhật thông tin để đặt hàng nhanh hơn và chính xác hơn.</p>

                    <div class="text-center mb-4 pb-4 border-bottom">
                        <img th:src="${user.avatarUrl}" alt="Avatar" id="avatarPreview"
                             class="rounded-circle shadow-sm border border-2 border-danger"
                             style="width: 120px; height: 120px; object-fit: cover;"
                             onerror="this.src='/images/no-image.svg'">
                        <form th:action="@{/user/profile/avatar}" method="post"
                              enctype="multipart/form-data" class="mt-3 d-inline-flex flex-column align-items-center gap-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <label class="btn btn-outline-danger btn-sm mb-0">
                                <i class="bi bi-camera me-1"></i>Chọn ảnh đại diện
                                <input type="file" name="avatarFile" accept="image/*" class="d-none"
                                       onchange="this.form.submit()">
                            </label>
                            <small class="text-muted">JPG, PNG, WebP — tối đa 10MB. Chọn xong sẽ tự đăng.</small>
                        </form>
                    </div>

                    <div th:if="${successMsg}" class="alert alert-success" role="alert">
                        <i class="bi bi-check-circle me-2"></i>
                        <span th:text="${successMsg}"></span>
                    </div>
                    <div th:if="${errorMsg}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-circle me-2"></i>
                        <span th:text="${errorMsg}"></span>
                    </div>

                    <form th:action="@{/user/profile}" method="post" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên đăng nhập</label>
                            <input type="text" class="form-control" th:value="${user.username}" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" class="form-control" th:value="${user.email}" disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Họ và tên</label>
                            <input type="text" class="form-control" name="fullName"
                                   th:value="${user.fullName}" placeholder="Nguyễn Văn A">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Số điện thoại</label>
                            <input type="tel" class="form-control" name="phone"
                                   th:value="${user.phone}" placeholder="0xxx-xxx-xxx">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Địa chỉ</label>
                            <textarea class="form-control" name="address" rows="3"
                                      placeholder="Số nhà, đường, phường/xã, quận/huyện..."
                                      th:text="${user.address}"></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-save me-2"></i>Lưu thông tin
                            </button>
                            <a class="btn btn-outline-secondary" th:href="@{/}">
                                <i class="bi bi-arrow-left me-2"></i>Quay lại
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
