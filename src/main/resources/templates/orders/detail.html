<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Đơn Hàng - ClothingShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-4" style="max-width: 800px;">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item"><a th:href="@{/orders/history}">Đơn hàng</a></li>
            <li class="breadcrumb-item active">Chi tiết #<span th:text="${order.id}"></span></li>
        </ol>
    </nav>

    <h2 class="fw-bold mb-4">
        <i class="bi bi-receipt me-2 text-danger"></i>
        Chi Tiết Đơn Hàng #<span th:text="${order.id}"></span>
    </h2>

    <div class="row g-4">
        <!-- Thông tin đơn hàng -->
        <div class="col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-dark text-white fw-bold">
                    <i class="bi bi-info-circle me-2"></i>Thông tin đơn hàng
                </div>
                <div class="card-body">
                    <table class="table table-borderless small">
                        <tr>
                            <td class="text-muted fw-semibold">Mã đơn:</td>
                            <td class="fw-bold">#<span th:text="${order.id}"></span></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold">Ngày đặt:</td>
                            <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold">Trạng thái:</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${order.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                                      (${order.status.name() == 'CONFIRMED'} ? 'bg-info text-dark' :
                                                      (${order.status.name() == 'SHIPPING'} ? 'bg-primary' :
                                                      (${order.status.name() == 'DELIVERED'} ? 'bg-success' : 'bg-danger')))"
                                      th:text="${order.status.displayName}">
                                </span>
                            </td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold">Địa chỉ:</td>
                            <td th:text="${order.shippingAddress}"></td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-semibold">SĐT:</td>
                            <td th:text="${order.phone}"></td>
                        </tr>
                        <tr th:if="${order.note != null and !order.note.empty}">
                            <td class="text-muted fw-semibold">Ghi chú:</td>
                            <td th:text="${order.note}"></td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>

        <!-- Tổng tiền -->
        <div class="col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-danger text-white fw-bold">
                    <i class="bi bi-calculator me-2"></i>Thanh toán
                </div>
                <div class="card-body d-flex flex-column justify-content-center">
                    <div class="d-flex justify-content-between mb-2">
                        <span>Tổng sản phẩm:</span>
                        <span th:text="${order.orderItems.size()} + ' món'"></span>
                    </div>
                    <div class="d-flex justify-content-between mb-2 text-success">
                        <span>Phí vận chuyển:</span>
                        <span>Miễn phí</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between">
                        <span class="fs-5 fw-bold">Tổng cộng:</span>
                        <span class="fs-5 fw-bold text-danger">
                            <span th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Danh sách sản phẩm trong đơn -->
    <div class="card border-0 shadow-sm mt-4">
        <div class="card-header bg-dark text-white fw-bold">
            <i class="bi bi-bag me-2"></i>Sản phẩm đã đặt
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-3">Sản phẩm</th>
                            <th class="text-center">Đơn giá</th>
                            <th class="text-center">SL</th>
                            <th class="text-center">Thành tiền</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${order.orderItems}">
                            <td class="ps-3">
                                <div class="d-flex align-items-center gap-2">
                                    <img th:src="${item.product.imageUrl}"
                                         style="width: 50px; height: 50px; object-fit: cover;"
                                         class="rounded"
                                         onerror="this.src='/images/no-image.svg'">
                                    <span th:text="${item.product.name}" class="fw-semibold"></span>
                                </div>
                            </td>
                            <td class="text-center"
                                th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            </td>
                            <td class="text-center fw-bold" th:text="${item.quantity}"></td>
                            <td class="text-center fw-bold text-danger"
                                th:text="${#numbers.formatDecimal(item.subTotal, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Nút quay lại -->
    <div class="mt-4">
        <a th:href="@{/orders/history}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-2"></i>Quay lại danh sách
        </a>
        <a th:href="@{/orders/bill/{id}(id=${order.id})}" class="btn btn-danger ms-2">
            <i class="bi bi-receipt me-2"></i>Xem bill
        </a>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
