<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Hàng - ClothingShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-4" style="max-width: 700px;">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item"><a th:href="@{/cart}">Giỏ hàng</a></li>
            <li class="breadcrumb-item active">Đặt hàng</li>
        </ol>
    </nav>

    <h2 class="fw-bold mb-4">
        <i class="bi bi-bag-check me-2 text-danger"></i>Xác Nhận Đặt Hàng
    </h2>

    <!-- Thông báo lỗi -->
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <!-- Form đặt hàng -->
            <form th:action="@{/orders/place}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <h5 class="fw-bold mb-3">
                    <i class="bi bi-geo-alt me-2 text-danger"></i>Thông tin giao hàng
                </h5>

                <!-- Họ tên người nhận -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Họ và tên người nhận *</label>
                    <input type="text" class="form-control"
                           name="receiverName"
                           th:value="${user.fullName}"
                           placeholder="Nguyễn Văn A"
                           required>
                </div>

                <!-- Số điện thoại -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Số điện thoại *</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-phone"></i></span>
                        <input type="tel" class="form-control"
                               name="phone"
                               th:value="${user.phone}"
                               placeholder="0xxx-xxx-xxx"
                               required>
                    </div>
                </div>

                <!-- Địa chỉ giao hàng -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Địa chỉ giao hàng *</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-house"></i></span>
                        <textarea class="form-control" name="address" rows="2"
                                  placeholder="Số nhà, đường, phường/xã, quận/huyện, tỉnh/thành phố"
                                  th:text="${user.address}"
                                  required></textarea>
                    </div>
                </div>

                <!-- Ghi chú đơn hàng -->
                <div class="mb-4">
                    <label class="form-label fw-semibold">Ghi chú (tùy chọn)</label>
                    <textarea class="form-control" name="note" rows="2"
                              placeholder="Ví dụ: Giao giờ hành chính, gọi trước khi giao..."></textarea>
                </div>

                <!-- Phương thức thanh toán -->
                <div class="mb-4">
                    <h5 class="fw-bold mb-3">
                        <i class="bi bi-credit-card me-2 text-danger"></i>Phương thức thanh toán
                    </h5>
                    <div class="form-check p-3 border rounded">
                        <input class="form-check-input" type="radio" name="paymentMethod"
                               id="cod" value="COD" checked>
                        <label class="form-check-label fw-semibold" for="cod">
                            <i class="bi bi-cash-coin text-success me-2"></i>
                            Thanh toán khi nhận hàng (COD)
                        </label>
                    </div>
                </div>

                <!-- Nút đặt hàng -->
                <div class="d-flex gap-3">
                    <a th:href="@{/cart}" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-arrow-left me-2"></i>Quay lại
                    </a>
                    <button type="submit" class="btn btn-danger px-5 flex-fill">
                        <i class="bi bi-check-circle me-2"></i>Xác nhận đặt hàng
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
