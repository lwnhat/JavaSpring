<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Đơn Hàng - ClothingShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item active">Đơn hàng của tôi</li>
        </ol>
    </nav>

    <h2 class="fw-bold mb-4">
        <i class="bi bi-bag-check me-2 text-danger"></i>Lịch Sử Đơn Hàng
    </h2>

    <!-- Thông báo -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Không có đơn hàng -->
    <div th:if="${orders == null or orders.empty}" class="text-center py-5">
        <i class="bi bi-bag-x fs-1 text-muted"></i>
        <h4 class="text-muted mt-3">Bạn chưa có đơn hàng nào!</h4>
        <a th:href="@{/products}" class="btn btn-danger mt-3">
            <i class="bi bi-bag-plus me-2"></i>Mua sắm ngay
        </a>
    </div>

    <!-- Danh sách đơn hàng -->
    <div th:if="${orders != null and !orders.empty}">
        <div class="card border-0 shadow-sm mb-3"
             th:each="order : ${orders}">
            <div class="card-body">
                <div class="row align-items-center">
                    <!-- Thông tin đơn -->
                    <div class="col-md-7">
                        <div class="d-flex align-items-center gap-3 mb-2">
                            <h6 class="fw-bold mb-0">
                                Đơn #<span th:text="${order.id}"></span>
                            </h6>
                            <!-- Badge trạng thái -->
                            <span class="badge"
                                  th:classappend="${order.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                                  (${order.status.name() == 'CONFIRMED'} ? 'bg-info text-dark' :
                                                  (${order.status.name() == 'SHIPPING'} ? 'bg-primary' :
                                                  (${order.status.name() == 'DELIVERED'} ? 'bg-success' : 'bg-danger')))"
                                  th:text="${order.status.displayName}">
                            </span>
                        </div>
                        <p class="text-muted small mb-1">
                            <i class="bi bi-clock me-1"></i>
                            <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                        </p>
                        <p class="text-muted small mb-0">
                            <i class="bi bi-geo-alt me-1"></i>
                            <span th:text="${order.shippingAddress}">Địa chỉ</span>
                        </p>
                    </div>
                    <!-- Tổng tiền + nút xem -->
                    <div class="col-md-5 text-md-end mt-3 mt-md-0">
                        <p class="fs-5 fw-bold text-danger mb-2">
                            <span th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                        </p>
                        <small class="text-muted d-block mb-2">
                            <span th:text="${order.orderItems.size()}"></span> sản phẩm
                        </small>
                        <a th:href="@{/orders/{id}(id=${order.id})}"
                           class="btn btn-outline-dark btn-sm">
                            <i class="bi bi-eye me-1"></i>Xem chi tiết
                        </a>
                        <a th:href="@{/orders/bill/{id}(id=${order.id})}"
                           class="btn btn-danger btn-sm ms-1">
                            <i class="bi bi-receipt me-1"></i>Xem bill
                        </a>
                    </div>
                </div>

                <!-- Preview sản phẩm trong đơn -->
                <div class="mt-3 pt-3 border-top">
                    <div class="d-flex gap-2 flex-wrap">
                        <div th:each="item, stat : ${order.orderItems}"
                             th:if="${stat.index < 3}"
                             class="d-flex align-items-center gap-2 border rounded p-2 bg-light"
                             style="max-width: 200px;">
                            <img th:src="${item.product.imageUrl}"
                                 style="width: 40px; height: 40px; object-fit: cover;"
                                 class="rounded"
                                 onerror="this.src='/images/no-image.svg'">
                            <div>
                                <small class="d-block text-truncate" style="max-width: 130px;"
                                       th:text="${item.product.name}"></small>
                                <small class="text-muted">x<span th:text="${item.quantity}"></span></small>
                            </div>
                        </div>
                        <div th:if="${order.orderItems.size() > 3}"
                             class="d-flex align-items-center text-muted small">
                            +<span th:text="${order.orderItems.size() - 3}"></span> sản phẩm khác
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
