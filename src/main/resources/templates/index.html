<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClothingShop - Thời Trang Hàng Đầu</title>
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav th:replace="~{fragments/header :: navbar}"></nav>

<!-- ========== BANNER (chỉ ảnh) ========== -->
<section class="hero-banner-only" aria-label="Banner cửa hàng">
    <img th:src="@{/images/logo/banner.jpg}" alt="Banner cửa hàng"
         class="hero-banner-full" width="1920" height="384" loading="eager" decoding="async">
</section>

<!-- ========== DANH MỤC ========== -->
<section class="py-4 bg-light">
    <div class="container">
        <div class="row g-3" th:if="${categories != null and !categories.empty}">
            <div class="col-auto" th:each="cat : ${categories}">
                <a th:href="@{/products(categoryId=${cat.id})}"
                   class="btn btn-outline-secondary rounded-pill">
                    <i class="bi bi-tag me-1"></i>
                    <span th:text="${cat.name}">Danh mục</span>
                </a>
            </div>
        </div>
    </div>
</section>

<!-- ========== SẢN PHẨM NỔI BẬT ========== -->
<section class="py-5" th:if="${featuredProducts != null and !featuredProducts.empty}">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">
                <i class="bi bi-star-fill text-warning me-2"></i>Sản phẩm nổi bật
            </h2>
            <a th:href="@{/products}" class="btn btn-outline-danger btn-sm">
                Xem tất cả <i class="bi bi-arrow-right ms-1"></i>
            </a>
        </div>
        <div class="row g-4">
            <div class="col-6 col-md-4 col-lg-3"
                 th:each="product : ${featuredProducts}">
                <!-- Card sản phẩm -->
                <div class="card product-card h-100 shadow-sm border-0">
                    <div class="product-img-wrapper">
                        <img th:src="${product.imageUrl}"
                             th:alt="${product.name}"
                             class="card-img-top product-img"
                             onerror="this.src='/images/no-image.svg'">
                        <!-- Badge nổi bật -->
                        <span class="badge bg-warning position-absolute top-0 start-0 m-2">
                            <i class="bi bi-star-fill"></i> Hot
                        </span>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <!-- Tên sản phẩm -->
                        <h6 class="card-title text-truncate">
                            <a th:href="@{/products/{id}(id=${product.id})}"
                               th:text="${product.name}"
                               class="text-decoration-none text-dark">Tên sản phẩm</a>
                        </h6>
                        <!-- Danh mục -->
                        <small class="text-muted mb-2"
                               th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}">
                        </small>
                        <!-- Giá -->
                        <p class="text-danger fw-bold mb-2 mt-auto">
                            <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
                                0
                            </span> ₫
                        </p>
                        <!-- Nút mua -->
                        <div class="d-flex gap-2">
                            <a th:href="@{/products/{id}(id=${product.id})}"
                               class="btn btn-outline-secondary btn-sm flex-fill">
                                Chi tiết
                            </a>
                            <!-- Chỉ hiện khi đăng nhập -->
                            <form th:action="@{/cart/add}" method="post"
                                  sec:authorize="isAuthenticated()">
                                <input type="hidden" name="productId" th:value="${product.id}">
                                <input type="hidden" name="quantity" value="1">
                                <input type="hidden" th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-danger btn-sm"
                                        title="Thêm vào giỏ">
                                    <i class="bi bi-cart-plus"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- ========== SẢN PHẨM MỚI NHẤT ========== -->
<section class="py-5 bg-light" th:if="${newestProducts != null and !newestProducts.empty}">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">
                <i class="bi bi-lightning-fill text-primary me-2"></i>Hàng mới về
            </h2>
            <a th:href="@{/products}" class="btn btn-outline-primary btn-sm">
                Xem tất cả <i class="bi bi-arrow-right ms-1"></i>
            </a>
        </div>
        <div class="row g-4">
            <div class="col-6 col-md-4 col-lg-3"
                 th:each="product : ${newestProducts}">
                <div class="card product-card h-100 shadow-sm border-0">
                    <div class="product-img-wrapper">
                        <img th:src="${product.imageUrl}"
                             th:alt="${product.name}"
                             class="card-img-top product-img"
                             onerror="this.src='/images/no-image.svg'">
                        <span class="badge bg-primary position-absolute top-0 start-0 m-2">Mới</span>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <h6 class="card-title text-truncate">
                            <a th:href="@{/products/{id}(id=${product.id})}"
                               th:text="${product.name}"
                               class="text-decoration-none text-dark">Tên sản phẩm</a>
                        </h6>
                        <small class="text-muted mb-2"
                               th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}">
                        </small>
                        <p class="text-danger fw-bold mb-2 mt-auto">
                            <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">
                                0
                            </span> ₫
                        </p>
                        <div class="d-flex gap-2">
                            <a th:href="@{/products/{id}(id=${product.id})}"
                               class="btn btn-outline-secondary btn-sm flex-fill">Chi tiết</a>
                            <form th:action="@{/cart/add}" method="post"
                                  sec:authorize="isAuthenticated()">
                                <input type="hidden" name="productId" th:value="${product.id}">
                                <input type="hidden" name="quantity" value="1">
                                <input type="hidden" th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-danger btn-sm">
                                    <i class="bi bi-cart-plus"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- ========== BANNER QUẢNG CÁO ========== -->
<section class="py-5">
    <div class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="text-center p-4 border rounded-3 h-100">
                    <i class="bi bi-truck fs-1 text-primary mb-3"></i>
                    <h5 class="fw-bold">Miễn phí vận chuyển</h5>
                    <p class="text-muted small">Cho đơn hàng từ 500.000₫</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="text-center p-4 border rounded-3 h-100">
                    <i class="bi bi-shield-check fs-1 text-success mb-3"></i>
                    <h5 class="fw-bold">Đảm bảo chất lượng</h5>
                    <p class="text-muted small">Hoàn trả trong 7 ngày</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="text-center p-4 border rounded-3 h-100">
                    <i class="bi bi-headset fs-1 text-danger mb-3"></i>
                    <h5 class="fw-bold">Hỗ trợ 24/7</h5>
                    <p class="text-muted small">Luôn sẵn sàng hỗ trợ bạn</p>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<!-- Scripts -->
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
