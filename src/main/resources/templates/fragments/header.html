<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ========== NAVBAR / HEADER FRAGMENT ========== -->
<!-- Sử dụng: <nav th:replace="~{fragments/header :: navbar}"></nav> -->

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top shadow-sm">
    <div class="container d-flex flex-wrap align-items-center">
        <!-- Logo: đặt file tại static/images/logo/logo.png -->
        <a class="navbar-brand d-flex align-items-center py-1 text-decoration-none flex-shrink-0" th:href="@{/}">
            <img th:src="@{/images/logo/logo.png}" alt="Trang chủ" class="navbar-logo" height="40" loading="lazy">
        </a>

        <!-- Toggle button cho mobile -->
        <button class="navbar-toggler ms-auto border-secondary" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarMain"
                aria-controls="navbarMain" aria-expanded="false" aria-label="Mở menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse flex-lg-grow-1 align-items-lg-center" id="navbarMain">
            <!-- Ba nhóm căn đều (menu | tìm kiếm | tài khoản) trên desktop -->
            <div class="navbar-balanced w-100">
                <ul class="navbar-nav navbar-nav-main flex-row justify-content-center align-items-center gap-1 gap-lg-2 my-2 my-lg-0 py-lg-1">
                    <li class="nav-item">
                        <a class="nav-link text-dark px-3" th:href="@{/}">
                            <i class="bi bi-house-door me-1"></i>Trang chủ
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-dark px-3" th:href="@{/products}">
                            <i class="bi bi-grid me-1"></i>Sản phẩm
                        </a>
                    </li>
                </ul>

                <form class="navbar-search-form d-flex justify-content-center mx-auto my-2 my-lg-0"
                      th:action="@{/products}" method="get">
                    <div class="input-group input-group-sm">
                        <input class="form-control border-secondary" type="search"
                               name="keyword" placeholder="Tìm kiếm sản phẩm...">
                        <button class="btn btn-outline-secondary" type="submit" aria-label="Tìm kiếm">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>

                <ul class="navbar-nav navbar-nav-actions flex-row flex-wrap justify-content-center align-items-center gap-1 gap-lg-2 mb-2 mb-lg-0 py-lg-1">
                <!-- Giỏ hàng - chỉ hiện khi đã đăng nhập -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link text-dark px-3 py-2 d-flex align-items-center" th:href="@{/cart}" title="Giỏ hàng">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span class="badge bg-danger rounded-pill ms-1">
                            <!-- Số lượng trong giỏ được cập nhật qua JS -->
                        </span>
                    </a>
                </li>

                <!-- Dropdown khi đã đăng nhập: avatar trước tên -->
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle text-dark d-flex align-items-center py-2"
                       href="#" data-bs-toggle="dropdown" role="button" aria-expanded="false">
                        <img th:if="${currentUser != null}"
                             th:src="${currentUser.avatarUrl}"
                             alt=""
                             class="navbar-user-avatar rounded-circle me-2 flex-shrink-0"
                             width="32" height="32"
                             onerror="this.src='/images/no-image.svg'">
                        <i class="bi bi-person-circle me-2 fs-5"
                           th:if="${currentUser == null}"></i>
                        <span sec:authentication="name">Username</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" th:href="@{/user/profile}">
                                <i class="bi bi-person-vcard me-2"></i>Thông tin cá nhân
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/orders/history}">
                                <i class="bi bi-bag-check me-2"></i>Đơn hàng của tôi
                            </a>
                        </li>
                        <!-- Link Admin - chỉ hiện cho ADMIN -->
                        <li sec:authorize="hasRole('ADMIN')">
                            <a class="dropdown-item text-danger" th:href="@{/admin}">
                                <i class="bi bi-shield-lock me-2"></i>Trang Admin
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item" th:href="@{/auth/logout}">
                                <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
                            </a>
                        </li>
                    </ul>
                </li>

                <!-- Hiện khi chưa đăng nhập -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link text-dark px-3 py-2" th:href="@{/auth/login}">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập
                    </a>
                </li>
                <li class="nav-item d-flex align-items-center" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-outline-danger btn-sm px-3" th:href="@{/auth/register}">
                        Đăng ký
                    </a>
                </li>
                </ul>
            </div>
        </div>
    </div>
</nav>

</html>
