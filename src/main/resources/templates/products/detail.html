<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - ClothingShop'">Chi Tiết Sản Phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-4">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item"><a th:href="@{/products}">Sản phẩm</a></li>
            <li class="breadcrumb-item active" th:text="${product.name}"></li>
        </ol>
    </nav>

    <!-- Thông báo -->
    <div th:if="${successMsg}" class="alert alert-success alert-dismissible">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- ========== CHI TIẾT SẢN PHẨM ========== -->
    <div class="row g-4">
        <!-- Ảnh sản phẩm -->
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-3">
                <img th:src="${product.imageUrl}"
                     th:alt="${product.name}"
                     class="img-fluid rounded"
                     id="mainImage"
                     onerror="this.src='/images/no-image.svg'"
                     style="max-height: 450px; object-fit: cover; width: 100%;">
            </div>
        </div>

        <!-- Thông tin sản phẩm -->
        <div class="col-md-7">
            <div class="card border-0 shadow-sm p-4 h-100">
                <!-- Danh mục -->
                <div class="mb-2" th:if="${product.category != null}">
                    <a th:href="@{/products(categoryId=${product.category.id})}"
                       class="badge bg-secondary text-decoration-none"
                       th:text="${product.category.name}">Danh mục</a>
                </div>

                <!-- Tên sản phẩm -->
                <h2 class="fw-bold mb-3" th:text="${product.name}">Tên sản phẩm</h2>

                <!-- Giá -->
                <div class="mb-3">
                    <span class="fs-2 fw-bold text-danger">
                        <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                    </span>
                </div>

                <!-- Trạng thái tồn kho -->
                <div class="mb-3">
                    <span th:if="${product.stock > 0}" class="badge bg-success fs-6">
                        <i class="bi bi-check-circle me-1"></i>
                        Còn hàng (<span th:text="${product.stock}"></span> cái)
                    </span>
                    <span th:if="${product.stock == 0}" class="badge bg-danger fs-6">
                        <i class="bi bi-x-circle me-1"></i>Hết hàng
                    </span>
                </div>

                <!-- Size -->
                <div class="mb-3" th:if="${product.sizes != null and !product.sizes.empty}">
                    <h6 class="fw-bold">Kích cỡ:</h6>
                    <div class="d-flex gap-2 flex-wrap" id="sizeGroup">
                        <div th:each="size : ${#strings.arraySplit(product.sizes, ',')}"
                             class="size-btn btn btn-outline-secondary btn-sm"
                             th:text="${#strings.trim(size)}"
                             onclick="selectSize(this)">S</div>
                    </div>
                </div>

                <!-- Màu sắc -->
                <div class="mb-3" th:if="${product.colors != null and !product.colors.empty}">
                    <h6 class="fw-bold">Màu sắc:</h6>
                    <small class="text-muted" th:text="${product.colors}"></small>
                </div>

                <!-- Mô tả ngắn -->
                <div class="mb-4" th:if="${product.description != null}">
                    <h6 class="fw-bold">Mô tả:</h6>
                    <p class="text-muted" th:text="${product.description}"></p>
                </div>

                <!-- Form thêm giỏ hàng - cho user đã đăng nhập -->
                <div sec:authorize="isAuthenticated()" th:if="${product.stock > 0}">
                    <form th:action="@{/cart/add}" method="post" class="row g-2">
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <div class="col-auto">
                            <label class="form-label fw-semibold">Số lượng:</label>
                            <div class="input-group" style="width: 130px;">
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="changeQty(-1)">-</button>
                                <input type="number" class="form-control text-center"
                                       id="qty" name="quantity" value="1" min="1"
                                       th:max="${product.stock}">
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="changeQty(1)">+</button>
                            </div>
                        </div>
                        <div class="col-12 mt-3">
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-danger btn-lg px-4">
                                    <i class="bi bi-cart-plus me-2"></i>Thêm vào giỏ
                                </button>
                                <a th:href="@{/cart}" class="btn btn-outline-dark btn-lg">
                                    <i class="bi bi-bag-check me-1"></i>Giỏ hàng
                                </a>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Nếu chưa đăng nhập -->
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/auth/login}" class="btn btn-danger btn-lg">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập để mua hàng
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== SẢN PHẨM LIÊN QUAN ========== -->
    <div th:if="${relatedProducts != null and !relatedProducts.empty}" class="mt-5">
        <h4 class="fw-bold mb-4">
            <i class="bi bi-grid me-2 text-danger"></i>Sản phẩm liên quan
        </h4>
        <div class="row g-3">
            <div class="col-6 col-md-3" th:each="rp : ${relatedProducts}">
                <div class="card product-card border-0 shadow-sm">
                    <img th:src="${rp.imageUrl}" th:alt="${rp.name}"
                         class="card-img-top product-img"
                         onerror="this.src='/images/no-image.svg'">
                    <div class="card-body p-2">
                        <small class="d-block text-truncate fw-semibold">
                            <a th:href="@{/products/{id}(id=${rp.id})}"
                               th:text="${rp.name}"
                               class="text-decoration-none text-dark">
                            </a>
                        </small>
                        <small class="text-danger fw-bold">
                            <span th:text="${#numbers.formatDecimal(rp.price, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
<script>
    function changeQty(delta) {
        const input = document.getElementById('qty');
        const max = parseInt(input.max) || 999;
        let val = parseInt(input.value) + delta;
        if (val < 1) val = 1;
        if (val > max) val = max;
        input.value = val;
    }

    function selectSize(el) {
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.classList.remove('btn-dark');
            btn.classList.add('btn-outline-secondary');
        });
        el.classList.remove('btn-outline-secondary');
        el.classList.add('btn-dark');
    }
</script>
</body>
</html>
