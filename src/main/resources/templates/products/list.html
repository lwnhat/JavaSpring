<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Sản Phẩm - ClothingShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-4">
    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item active">Sản phẩm</li>
        </ol>
    </nav>

    <div class="row">
        <!-- ========== SIDEBAR LỌC ========== -->
        <div class="col-md-3 mb-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-dark text-white fw-bold">
                    <i class="bi bi-funnel me-2"></i>Lọc sản phẩm
                </div>
                <div class="card-body">
                    <!-- Form tìm kiếm + lọc -->
                    <form th:action="@{/products}" method="get">
                        <!-- Tìm theo tên -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Tìm kiếm</label>
                            <div class="input-group input-group-sm">
                                <input type="text" class="form-control" name="keyword"
                                       th:value="${keyword}"
                                       placeholder="Tên sản phẩm...">
                                <button class="btn btn-outline-secondary" type="submit">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Lọc theo danh mục -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Danh mục</label>
                            <div th:each="cat : ${categories}" class="form-check">
                                <input class="form-check-input" type="radio"
                                       name="categoryId"
                                       th:value="${cat.id}"
                                       th:id="'cat-' + ${cat.id}"
                                       th:checked="${categoryId != null and categoryId == cat.id}">
                                <label class="form-check-label small"
                                       th:for="'cat-' + ${cat.id}"
                                       th:text="${cat.name}">Danh mục</label>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-sm">
                                Áp dụng lọc
                            </button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary btn-sm">
                                Xóa bộ lọc
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- ========== DANH SÁCH SẢN PHẨM ========== -->
        <div class="col-md-9">
            <!-- Tiêu đề + số kết quả -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0">
                    <span th:if="${keyword != null and !keyword.empty}">
                        Kết quả tìm: "<span class="text-danger" th:text="${keyword}"></span>"
                    </span>
                    <span th:if="${keyword == null or keyword.empty}">Tất cả sản phẩm</span>
                </h5>
                <small class="text-muted">
                    Tìm thấy <span class="fw-bold text-danger" th:text="${totalItems}">0</span> sản phẩm
                </small>
            </div>

            <!-- Thông báo -->
            <div th:if="${successMsg}" class="alert alert-success alert-dismissible">
                <span th:text="${successMsg}"></span>
                <button class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible">
                <span th:text="${errorMsg}"></span>
                <button class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Grid sản phẩm -->
            <div class="row g-3" th:if="${products != null and !products.empty}">
                <div class="col-6 col-lg-4" th:each="product : ${products}">
                    <div class="card product-card h-100 shadow-sm border-0">
                        <div class="product-img-wrapper">
                            <a th:href="@{/products/{id}(id=${product.id})}">
                                <img th:src="${product.imageUrl}"
                                     th:alt="${product.name}"
                                     class="card-img-top product-img"
                                     onerror="this.src='/images/no-image.svg'">
                            </a>
                            <!-- Badge hết hàng -->
                            <span th:if="${product.stock == 0}"
                                  class="badge bg-secondary position-absolute top-0 end-0 m-2">
                                Hết hàng
                            </span>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <!-- Danh mục -->
                            <small class="text-muted"
                                   th:text="${product.category != null ? product.category.name : ''}">
                            </small>
                            <!-- Tên -->
                            <h6 class="card-title mt-1">
                                <a th:href="@{/products/{id}(id=${product.id})}"
                                   th:text="${product.name}"
                                   class="text-decoration-none text-dark stretched-link-no">
                                </a>
                            </h6>
                            <!-- Giá -->
                            <p class="text-danger fw-bold mt-auto mb-2">
                                <span th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></span> ₫
                            </p>
                            <!-- Nút hành động -->
                            <div class="d-flex gap-2">
                                <a th:href="@{/products/{id}(id=${product.id})}"
                                   class="btn btn-sm btn-outline-dark flex-fill">
                                    <i class="bi bi-eye me-1"></i>Xem
                                </a>
                                <form th:action="@{/cart/add}" method="post"
                                      sec:authorize="isAuthenticated()"
                                      th:if="${product.stock > 0}">
                                    <input type="hidden" name="productId" th:value="${product.id}">
                                    <input type="hidden" name="quantity" value="1">
                                    <input type="hidden" th:name="${_csrf.parameterName}"
                                           th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-sm btn-danger">
                                        <i class="bi bi-cart-plus"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Thông báo không có sản phẩm -->
            <div th:if="${products == null or products.empty}"
                 class="text-center py-5">
                <i class="bi bi-search fs-1 text-muted"></i>
                <p class="text-muted mt-3">Không tìm thấy sản phẩm nào!</p>
                <a th:href="@{/products}" class="btn btn-outline-danger">Xem tất cả sản phẩm</a>
            </div>

            <!-- ========== PHÂN TRANG (PAGINATION) ========== -->
            <nav th:if="${totalPages > 1}" class="mt-4">
                <ul class="pagination justify-content-center">
                    <!-- Nút Previous -->
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/products(keyword=${keyword}, categoryId=${categoryId}, page=${currentPage - 1})}">
                            <i class="bi bi-chevron-left"></i>
                        </a>
                    </li>
                    <!-- Các trang -->
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:href="@{/products(keyword=${keyword}, categoryId=${categoryId}, page=${i})}"
                           th:text="${i + 1}">1</a>
                    </li>
                    <!-- Nút Next -->
                    <li class="page-item"
                        th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/products(keyword=${keyword}, categoryId=${categoryId}, page=${currentPage + 1})}">
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
