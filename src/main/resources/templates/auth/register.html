<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - ClothingShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <!-- Tiêu đề -->
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus-fill fs-1 text-danger"></i>
                        <h3 class="fw-bold mt-2">Tạo Tài Khoản</h3>
                        <p class="text-muted small">Đăng ký để mua sắm dễ dàng hơn!</p>
                    </div>

                    <!-- Thông báo lỗi chung -->
                    <div th:if="${errorMsg}" class="alert alert-danger" role="alert">
                        <i class="bi bi-exclamation-circle me-2"></i>
                        <span th:text="${errorMsg}"></span>
                    </div>

                    <!-- Form đăng ký -->
                    <form th:action="@{/auth/register}" method="post"
                          th:object="${user}" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">

                        <!-- Username -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tên đăng nhập *</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control"
                                       th:class="${#fields.hasErrors('username')} ? 'form-control is-invalid' : 'form-control'"
                                       th:field="*{username}"
                                       placeholder="Tối thiểu 3 ký tự">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('username')}"
                                     th:errors="*{username}"></div>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email *</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control"
                                       th:class="${#fields.hasErrors('email')} ? 'form-control is-invalid' : 'form-control'"
                                       th:field="*{email}"
                                       placeholder="example@email.com">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('email')}"
                                     th:errors="*{email}"></div>
                            </div>
                        </div>

                        <!-- Họ và tên -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Họ và tên</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                <input type="text" class="form-control"
                                       th:field="*{fullName}"
                                       placeholder="Nguyễn Văn A">
                            </div>
                        </div>

                        <!-- Số điện thoại -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Số điện thoại</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-phone"></i></span>
                                <input type="tel" class="form-control"
                                       th:field="*{phone}"
                                       placeholder="0xxx-xxx-xxx">
                            </div>
                        </div>

                        <!-- Địa chỉ -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Địa chỉ</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                                <input type="text" class="form-control"
                                       th:field="*{address}"
                                       placeholder="Số nhà, đường, phường/xã, quận/huyện...">
                            </div>
                        </div>

                        <!-- Mật khẩu -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Mật khẩu *</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control"
                                       th:class="${#fields.hasErrors('password')} ? 'form-control is-invalid' : 'form-control'"
                                       th:field="*{password}"
                                       id="password"
                                       placeholder="Tối thiểu 6 ký tự">
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('password')">
                                    <i class="bi bi-eye" id="password-eye"></i>
                                </button>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('password')}"
                                     th:errors="*{password}"></div>
                            </div>
                        </div>

                        <!-- Xác nhận mật khẩu -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Xác nhận mật khẩu *</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" class="form-control"
                                       name="confirmPassword"
                                       id="confirmPassword"
                                       placeholder="Nhập lại mật khẩu">
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('confirmPassword')">
                                    <i class="bi bi-eye" id="confirmPassword-eye"></i>
                                </button>
                            </div>
                            <!-- Hiện lỗi mật khẩu không khớp -->
                            <div class="text-danger small mt-1"
                                 th:if="${passwordError}"
                                 th:text="${passwordError}"></div>
                        </div>

                        <!-- Nút đăng ký -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-danger btn-lg">
                                <i class="bi bi-person-check me-2"></i>Đăng Ký
                            </button>
                        </div>
                    </form>

                    <!-- Link đăng nhập -->
                    <div class="text-center mt-3">
                        <p class="text-muted small">
                            Đã có tài khoản?
                            <a th:href="@{/auth/login}" class="text-danger fw-semibold">
                                Đăng nhập ngay
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
<script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        const eye = document.getElementById(id + '-eye');
        if (input.type === 'password') {
            input.type = 'text';
            eye.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            eye.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>
</html>
