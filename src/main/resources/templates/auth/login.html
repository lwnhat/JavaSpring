<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - ClothingShop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <!-- Tiêu đề -->
                    <div class="text-center mb-4">
                        <i class="bi bi-person-circle fs-1 text-danger"></i>
                        <h3 class="fw-bold mt-2">Đăng Nhập</h3>
                        <p class="text-muted small">Chào mừng bạn quay lại!</p>
                    </div>

                    <!-- Thông báo thành công (sau khi đăng ký) -->
                    <div th:if="${successMsg}" class="alert alert-success alert-dismissible" role="alert">
                        <i class="bi bi-check-circle me-2"></i>
                        <span th:text="${successMsg}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Thông báo lỗi -->
                    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible" role="alert">
                        <i class="bi bi-exclamation-circle me-2"></i>
                        <span th:text="${errorMsg}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Thông báo đăng xuất -->
                    <div th:if="${logoutMsg}" class="alert alert-info alert-dismissible" role="alert">
                        <i class="bi bi-info-circle me-2"></i>
                        <span th:text="${logoutMsg}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- Form đăng nhập -->
                    <!-- Spring Security xử lý POST /auth/login -->
                    <form th:action="@{/auth/login}" method="post">
                        <!-- CSRF Token - bắt buộc với Spring Security -->
                        <input type="hidden" th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                Tên đăng nhập
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person"></i>
                                </span>
                                <input type="text" class="form-control"
                                       id="username" name="username"
                                       placeholder="Nhập tên đăng nhập"
                                       required autocomplete="username">
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">
                                Mật khẩu
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock"></i>
                                </span>
                                <input type="password" class="form-control"
                                       id="password" name="password"
                                       placeholder="Nhập mật khẩu"
                                       required autocomplete="current-password">
                                <!-- Toggle hiện/ẩn mật khẩu -->
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('password')">
                                    <i class="bi bi-eye" id="password-eye"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Nút đăng nhập -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-danger btn-lg">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                            </button>
                        </div>
                    </form>

                    <!-- Link đăng ký -->
                    <div class="text-center mt-3">
                        <p class="text-muted small">
                            Chưa có tài khoản?
                            <a th:href="@{/auth/register}" class="text-danger fw-semibold">
                                Đăng ký ngay
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
<script>
    // Hàm toggle hiện/ẩn mật khẩu
    function togglePassword(id) {
        const input = document.getElementById(id);
        const eye = document.getElementById(id + '-eye');
        if (input.type === 'password') {
            input.type = 'text';
            eye.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            eye.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>
</html>
